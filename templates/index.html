<!DOCTYPE html>
<html>
<head>
    <title>Gestion Contacts</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<body class="bg-light">

<div class="container mt-4">

    <h2 class="text-center mb-4">📇 Gestion des Contacts</h2>

    <!-- 🔍 SEARCH -->
    <form class="d-flex mb-3">
        <input class="form-control me-2" name="search" placeholder="Rechercher par nom">
        <button class="btn btn-primary">Search</button>
    </form>

    <!-- ➕ ADD FORM -->
    <form action="/add" method="POST" class="card p-3 mb-4 shadow-sm">

        <input class="form-control mb-2" name="full_name" placeholder="Nom complet" required>
        <input class="form-control mb-2" name="phone" placeholder="Téléphone" required>
        <input class="form-control mb-2" name="email" placeholder="Email">
        <input class="form-control mb-2" name="telegram" placeholder="Telegram">

        <button class="btn btn-success">Ajouter contact</button>
    </form>

    <!-- 📋 CONTACT LIST -->
    <div class="row">

        {% for c in contacts %}
        <div class="col-md-4 col-sm-6 mb-3">

            <div class="card p-3 shadow-sm">

                <h5>{{ c["full_name"] }}</h5>

                <p>
                    📞 {{ c["phone"] }}<br>
                    📧 {{ c["email"] }}<br>
                    💬 {{ c["telegram"] }}
                </p>

                <!-- ❌ DELETE -->
                <a href="/delete/{{ c['id'] }}" class="btn btn-danger btn-sm mb-2">Supprimer</a>

                <!-- ✏️ UPDATE -->
                <form action="/update/{{ c['id'] }}" method="POST">

                    <input class="form-control mb-1" name="full_name" value="{{ c['full_name'] }}">
                    <input class="form-control mb-1" name="phone" value="{{ c['phone'] }}">
                    <input class="form-control mb-1" name="email" value="{{ c['email'] }}">
                    <input class="form-control mb-1" name="telegram" value="{{ c['telegram'] }}">

                    <button class="btn btn-warning btn-sm w-100">Modifier</button>

                </form>

            </div>

        </div>
        {% endfor %}

    </div>

</div>

</body>
</html>
